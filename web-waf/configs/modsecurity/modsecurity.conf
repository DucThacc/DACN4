# ModSecurity Configuration for DVWA
# ====================================
# Detection and Prevention Configuration

SecRuleEngine DetectionOnly
# ⚠️ ĐỔI THÀNH "On" ĐỂ BLOCK ATTACKS (đặt ở BLOCKING MODE)

# Enable audit log
SecAuditEngine On
SecAuditLogFormat JSON
SecAuditLog /var/log/modsec/audit.log
SecAuditLogType Concurrent
SecAuditLogRelevantStatus ^(?:4|5)
SecAuditLogDirMode 0755
SecAuditLogFileMode 0644

# Data storage
SecDataDir /var/lib/modsecurity

# Adjust HTTP policy
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction ProcessPartial
SecRequestBodyInMemoryLimit 131072
SecResponseBodyLimit 524288
SecResponseBodyMimeType text/plain text/html text/xml

# File upload handling
SecUploadDir /var/cache/modsecurity
SecUploadKeepFiles Off

# Temporary directory
SecTmpDir /var/cache/modsecurity

# Include OWASP Core Rule Set
Include /usr/share/modsecurity-crs/crs-setup.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-901-INITIALIZATION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-903-PROTOCOL-VALIDATION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-910-IP-REPUTATION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-911-METHOD-ENFORCEMENT.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-912-DOS-PROTECTION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-913-SCANNER-DETECTION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-920-PROTOCOL-ENFORCEMENT.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-921-PROTOCOL-ATTACK.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-931-APPLICATION-ATTACK-RFI.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-933-APPLICATION-ATTACK-PHP.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-949-BLOCKING-EVALUATION.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-900-EXCLUSION-RULES-AFTER-CRS.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-910-IP-REPUTATION.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-911-HONEYPOT.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-912-DOS-PROTECTION.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-913-SCANNER-DETECTION.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-920-PROTOCOL-ENFORCEMENT.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-921-PROTOCOL-ATTACK.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-930-APPLICATION-ATTACK-LFI.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-931-APPLICATION-ATTACK-RFI.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-932-APPLICATION-ATTACK-RCE.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-933-APPLICATION-ATTACK-PHP.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-941-APPLICATION-ATTACK-XSS.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-942-APPLICATION-ATTACK-SQLI.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-949-BLOCKING-EVALUATION.conf

# Custom rules cho DVWA
SecRule ARGS:id "@rx (\bor\b|\bunion\b|\bselect\b|\binsert\b|\bupdate\b|\bdelete\b|\bdrop\b)" \
    "id:1001,phase:2,deny,status:403,msg:'SQL Injection Attempted',tag:'attack/sqli',chain"
    SecRule ARGS:id "@rx [\'\"]" "chain"
    SecRule ARGS:id "@rx (--|;|\*\/)"

SecRule ARGS "@rx <.*?script.*?" \
    "id:1002,phase:2,deny,status:403,msg:'XSS Attempt Detected',tag:'attack/xss'"

SecRule ARGS "@rx (\.\.\/|\.\.\\)" \
    "id:1003,phase:2,deny,status:403,msg:'Directory Traversal Detected',tag:'attack/lfi'"

SecRule ARGS "@rx (ftp:\/\/|gopher:\/\/|http:\/\/|https:\/\/)" \
    "id:1004,phase:2,deny,status:403,msg:'RFI Attempt Detected',tag:'attack/rfi'"

# Logging
SecRule REQUEST_URI "/" \
    "id:1005,phase:1,pass,nolog,logdata:'%{REQUEST_METHOD} %{REQUEST_URI}'"
