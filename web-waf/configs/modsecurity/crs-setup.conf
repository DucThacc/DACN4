# OWASP CRS Setup configuration
# ================================

# Paranoia level (1-4, higher = stricter)
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.paranoia_level=1"
# ⚠️ ĐỔI THÀNH 2-4 NẾU CẦN KIỂM SOÁT CHẶT HƠN

# Anomaly scoring threshold
SecAction \
    "id:900001,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.anomaly_score_threshold=5"

# Inbound anomaly score
SecAction \
    "id:900002,\
    phase:5,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score=0,\
    setvar:tx.outbound_anomaly_score=0"

# Outbound anomaly score threshold
SecAction \
    "id:900003,\
    phase:5,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# Sensitive data filtering
SecAction \
    "id:900004,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.collection_timeout=600"

# Restricted extensions
SecAction \
    "id:900005,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.restricted_extensions=.asa/ .asax/ .ascx/ .axd/ .cer/ .cer/ .ckm/ .cmd/ .com/ .config/ .ctl/ .htaccess/ .htpasswd/ .ini/ .ins/ .isp/ .jtr/ .key/ .licx/ .lnk/ .mad/ .mam/ .maq/ .mar/ .mas/ .mat/ .mau/ .mav/ .maw/ .max/ .maz/ .mde/ .mdf/ .mdw/ .mda/ .mdt/ .mdz/ .msi/ .mso/ .msp/ .mst/ .msu/ .ops/ .pcd/ .pif/ .prf/ .prg/ .pst/ .scf/ .scr/ .sct/ .shb/ .shs/ .shtm/ .shtml/ .signed/ .sln/ .suo/ .tmp/ .url/ .vb/ .vbe/ .vbs/ .vcf/ .vcs/ .vsd/ .vss/ .vst/ .vsw/ .vsx/ .vtx/ .webinfo/ .xsd/ .xsl/"

# Restricted headers
SecAction \
    "id:900006,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.restricted_headers=/content-encoding/ /content-range/ /range/ /transfer-encoding/"

# Debug logging
SecAction \
    "id:900007,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.debug_logging=0"
# ⚠️ ĐỔI THÀNH 1 ĐỂ ENABLE DEBUG MODE CHO TROUBLESHOOTING
