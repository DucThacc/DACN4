version: '3.9'

services:
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata-ids
    # ⚠️ QUAN TRỌNG: network_mode: host để sniff container traffic
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    volumes:
      - ./configs/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./rules:/var/lib/suricata/rules:rw
      - ./logs:/var/log/suricata/:rw
    mem_limit: 768m
    memswap_limit: 768m
    restart: unless-stopped
    # ⚠️ THAY ĐỔI eth0 THÀNH INTERFACE CỦA UBUNTU SERVER (VD: ens0, enp0s3, wlan0, vv)
    # Xem: ip link show (trên Ubuntu để liệt kê interfaces)
    command: suricata -c /etc/suricata/suricata.yaml -i eth0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # ⚠️ ĐỔI IP NÀY THÀNH IP CỦA UBUNTU SERVER
      HOME_NET: "172.20.0.0/16"
      EXTERNAL_NET: "!$HOME_NET"
